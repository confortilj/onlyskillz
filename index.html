<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>skillz.ai — The Marketplace for LLM Powerups</title>
<meta name="description" content="Skills, prompt packs, datasets, avatars, voices and fine-tuned models for ChatGPT, Claude & more. Security-scanned, forensically watermarked, sellers keep 67%.">
<meta property="og:title" content="skillz.ai — The Marketplace for LLM Powerups">
<meta property="og:description" content="Security-scanned skills, prompts, datasets, avatars, voices & models for your LLM. Plans from $15/mo.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#8b6cff">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%238b6cff'/%3E%3Ctext x='32' y='44' font-size='36' font-weight='800' font-family='sans-serif' fill='white' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E">
<style>
  :root[data-theme="dark"]{
    --bg:#0a0a0d; --bg2:#0e0e12; --surface:#131318; --surface2:#1a1a21;
    --border:#26262e; --border2:#34343e;
    --text:#f4f4f7; --muted:#9494a1; --faint:#62626e;
    --accent:#8b6cff; --accent2:#a78bff; --accent-dim:rgba(139,108,255,.14);
    --green:#3ddc84; --green-dim:rgba(61,220,132,.12);
    --yellow:#ffc94d; --yellow-dim:rgba(255,201,77,.12);
    --red:#ff5c6c; --red-dim:rgba(255,92,108,.12);
    --shadow:0 8px 32px rgba(0,0,0,.45);
    --hero-grad:radial-gradient(ellipse 80% 60% at 50% -10%, rgba(139,108,255,.18), transparent);
  }
  :root[data-theme="light"]{
    --bg:#fafafa; --bg2:#f4f4f6; --surface:#ffffff; --surface2:#f6f6f9;
    --border:#e7e7ec; --border2:#d8d8e0;
    --text:#16161a; --muted:#5f5f6b; --faint:#9b9ba6;
    --accent:#6c4cf1; --accent2:#5638d6; --accent-dim:rgba(108,76,241,.09);
    --green:#149d5b; --green-dim:rgba(20,157,91,.10);
    --yellow:#b07b00; --yellow-dim:rgba(176,123,0,.10);
    --red:#d63649; --red-dim:rgba(214,54,73,.08);
    --shadow:0 8px 28px rgba(22,22,26,.08);
    --hero-grad:radial-gradient(ellipse 80% 60% at 50% -10%, rgba(108,76,241,.10), transparent);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased;
    transition:background .25s,color .25s;
  }
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
  input,select,textarea{font-family:inherit;font-size:inherit;color:var(--text)}
  ::placeholder{color:var(--faint)}

  /* ---------- Nav ---------- */
  nav{
    position:sticky;top:0;z-index:100;
    display:flex;align-items:center;gap:26px;
    padding:0 28px;height:60px;
    background:color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
  }
  .logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:17px;letter-spacing:-.02em;cursor:pointer}
  .logo-mark{
    width:26px;height:26px;border-radius:8px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:13px;font-weight:800;
  }
  .nav-links{display:flex;gap:4px;flex:1}
  .nav-link{
    padding:7px 13px;border-radius:8px;color:var(--muted);
    font-size:14px;font-weight:500;transition:all .15s;
  }
  .nav-link:hover{color:var(--text);background:var(--surface2)}
  .nav-link.active{color:var(--text);background:var(--surface2)}
  .nav-right{display:flex;align-items:center;gap:12px}
  .theme-btn{
    width:36px;height:36px;border-radius:9px;border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;font-size:15px;
    transition:all .15s; background:var(--surface);
  }
  .theme-btn:hover{border-color:var(--border2)}
  .avatar{
    width:34px;height:34px;border-radius:50%;
    background:linear-gradient(135deg,#ff8a5c,#ff5c8a);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:13px;cursor:pointer;
  }
  .plan-chip{
    font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    padding:4px 10px;border-radius:99px;
    background:var(--accent-dim);color:var(--accent);
  }
  /* Keyboard focus visibility for interactive elements */
  [role="button"]:focus-visible,[role="switch"]:focus-visible,[role="checkbox"]:focus-visible,
  .nav-link:focus-visible,tr[tabindex]:focus-visible{
    outline:2px solid var(--accent);outline-offset:2px;
  }
  /* Mobile nav — collapse header into two rows with scrollable links below ~640px */
  @media (max-width:640px){
    nav{flex-wrap:wrap;height:auto;padding:10px 16px;gap:10px;row-gap:8px}
    .nav-links{order:3;flex:1 1 100%;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
    .nav-links::-webkit-scrollbar{display:none}
    .nav-link{white-space:nowrap;padding:7px 10px;font-size:13px}
    .nav-right{margin-left:auto;gap:8px}
  }

  /* ---------- Layout ---------- */
  .page{max-width:1180px;margin:0 auto;padding:40px 28px 90px}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin:46px 0 18px}
  .section-title{font-size:20px;font-weight:700;letter-spacing:-.02em}
  .section-sub{font-size:13px;color:var(--muted)}
  .see-all{font-size:13px;color:var(--accent);font-weight:600}
  .see-all:hover{text-decoration:underline}

  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:9px 18px;border-radius:10px;font-weight:600;font-size:14px;
    transition:all .15s;border:1px solid transparent;white-space:nowrap;
  }
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent2)}
  .btn-ghost{border-color:var(--border);background:var(--surface)}
  .btn-ghost:hover{border-color:var(--border2);background:var(--surface2)}
  .btn-danger{background:var(--red-dim);color:var(--red);border-color:transparent}
  .btn-danger:hover{filter:brightness(1.1)}
  .btn-sm{padding:6px 13px;font-size:13px;border-radius:8px}
  .btn-lg{padding:13px 26px;font-size:15px;border-radius:12px}
  .btn[disabled]{opacity:.45;cursor:not-allowed}

  /* ---------- Cards ---------- */
  .grid{display:grid;gap:16px}
  .grid-3{grid-template-columns:repeat(3,1fr)}
  .grid-4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:980px){.grid-3,.grid-4{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:640px){.grid-3,.grid-4{grid-template-columns:1fr}}

  .skill-card{
    background:var(--surface);border:1px solid var(--border);border-radius:16px;
    padding:18px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;gap:11px;
  }
  .skill-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow)}
  .skill-icon{
    width:42px;height:42px;border-radius:11px;font-size:20px;
    display:flex;align-items:center;justify-content:center;
    background:var(--surface2);border:1px solid var(--border);
  }
  .skill-card-top{display:flex;justify-content:space-between;align-items:flex-start}
  .skill-name{font-weight:650;font-size:15px;letter-spacing:-.01em}
  .skill-by{font-size:12.5px;color:var(--muted)}
  .skill-desc{font-size:13px;color:var(--muted);line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:39px}
  .skill-meta{display:flex;align-items:center;gap:13px;font-size:12px;color:var(--faint);margin-top:auto}
  .skill-meta b{color:var(--muted);font-weight:600}

  .badge{
    display:inline-flex;align-items:center;gap:4px;
    font-size:10.5px;font-weight:700;letter-spacing:.03em;
    padding:3px 8px;border-radius:6px;white-space:nowrap;
  }
  .badge-safe{background:var(--green-dim);color:var(--green)}
  .badge-warn{background:var(--yellow-dim);color:var(--yellow)}
  .badge-risk{background:var(--red-dim);color:var(--red)}
  .badge-tier{background:var(--accent-dim);color:var(--accent)}
  .badge-llm{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
  .llm-row{display:flex;gap:5px;flex-wrap:wrap}

  .upvote{
    display:inline-flex;align-items:center;gap:5px;
    padding:4px 10px;border-radius:8px;border:1px solid var(--border);
    font-size:12.5px;font-weight:600;color:var(--muted);transition:all .15s;background:var(--surface);
  }
  .upvote:hover{border-color:var(--accent);color:var(--accent)}
  .upvote.voted{background:var(--accent-dim);border-color:transparent;color:var(--accent)}

  /* ---------- Hero ---------- */
  .hero{
    text-align:center;padding:74px 20px 60px;position:relative;
    background:var(--hero-grad);
  }
  .hero h1{font-size:clamp(34px,5.5vw,56px);font-weight:800;letter-spacing:-.035em;line-height:1.08}
  .hero h1 .grad{background:linear-gradient(100deg,var(--accent),var(--accent2),var(--accent));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{font-size:17px;color:var(--muted);max-width:560px;margin:18px auto 0}
  .hero-search{
    display:flex;align-items:center;gap:10px;max-width:560px;margin:30px auto 0;
    background:var(--surface);border:1px solid var(--border);border-radius:14px;
    padding:7px 7px 7px 18px;box-shadow:var(--shadow);
  }
  .hero-search input{flex:1;background:none;border:none;outline:none;font-size:15px;min-width:0}
  .hero-stats{display:flex;gap:38px;justify-content:center;margin-top:42px;flex-wrap:wrap}
  .hero-stat{text-align:center}
  .hero-stat .n{font-size:22px;font-weight:800;letter-spacing:-.02em}
  .hero-stat .l{font-size:12px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;font-weight:600}

  /* ---------- Browse ---------- */
  .filter-bar{
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:24px;
  }
  .filter-bar input[type=search]{
    flex:1;min-width:220px;padding:10px 16px;border-radius:11px;
    border:1px solid var(--border);background:var(--surface);outline:none;
  }
  .filter-bar input[type=search]:focus{border-color:var(--accent)}
  .filter-bar select{
    padding:10px 12px;border-radius:11px;border:1px solid var(--border);
    background:var(--surface);outline:none;cursor:pointer;font-size:13.5px;
  }
  .chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
  .chip{
    padding:6px 14px;border-radius:99px;font-size:13px;font-weight:550;
    border:1px solid var(--border);color:var(--muted);transition:all .15s;background:var(--surface);
  }
  .chip:hover{border-color:var(--border2);color:var(--text)}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}

  /* ---------- Detail ---------- */
  .detail-grid{display:grid;grid-template-columns:1fr 300px;gap:34px;align-items:start}
  @media(max-width:880px){.detail-grid{grid-template-columns:1fr}}
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin:26px 0 24px}
  .tab{
    padding:10px 17px;font-size:14px;font-weight:600;color:var(--muted);
    border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;
  }
  .tab:hover{color:var(--text)}
  .tab.on{color:var(--text);border-color:var(--accent)}
  .sidebar-card{
    background:var(--surface);border:1px solid var(--border);border-radius:16px;
    padding:20px;display:flex;flex-direction:column;gap:14px;
  }
  .meta-row{display:flex;justify-content:space-between;font-size:13.5px;padding:7px 0;border-bottom:1px solid var(--border)}
  .meta-row:last-child{border:none}
  .meta-row .k{color:var(--muted)}
  .meta-row .v{font-weight:600;text-align:right}

  .docs{font-size:14.5px;line-height:1.7;color:var(--text)}
  .docs h2{font-size:19px;margin:26px 0 10px;letter-spacing:-.01em}
  .docs h3{font-size:15.5px;margin:20px 0 8px}
  .docs p{margin:10px 0;color:var(--muted)}
  .docs ul{margin:10px 0 10px 22px;color:var(--muted)}
  .docs li{margin:4px 0}
  .docs code{background:var(--surface2);border:1px solid var(--border);padding:2px 6px;border-radius:5px;font-size:12.5px;font-family:'SF Mono',ui-monospace,monospace}
  .codeblock{
    position:relative;background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:15px 18px;margin:13px 0;
    font-family:'SF Mono',ui-monospace,Menlo,monospace;font-size:12.5px;line-height:1.6;
    overflow-x:auto;color:var(--text);
  }
  .copy-btn{
    position:absolute;top:9px;right:9px;font-size:11px;font-weight:600;
    padding:4px 10px;border-radius:7px;border:1px solid var(--border);
    background:var(--surface2);color:var(--muted);transition:all .15s;
  }
  .copy-btn:hover{color:var(--text);border-color:var(--border2)}

  .score-ring{position:relative;width:120px;height:120px}
  .score-ring svg{transform:rotate(-90deg)}
  .score-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .score-num .n{font-size:28px;font-weight:800;letter-spacing:-.02em}
  .score-num .d{font-size:11px;color:var(--faint)}
  .check-item{display:flex;gap:12px;align-items:flex-start;padding:13px 0;border-bottom:1px solid var(--border)}
  .check-item:last-child{border:none}
  .check-ico{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}

  /* ---------- Pricing ---------- */
  .pricing-toggle{display:flex;align-items:center;gap:13px;justify-content:center;margin:26px 0 38px;font-size:14px;font-weight:600}
  .switch{width:46px;height:26px;border-radius:99px;background:var(--surface2);border:1px solid var(--border);position:relative;transition:all .2s}
  .switch.on{background:var(--accent);border-color:var(--accent)}
  .switch .knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
  .switch.on .knob{left:22px}
  .save-tag{font-size:11px;font-weight:700;color:var(--green);background:var(--green-dim);padding:3px 9px;border-radius:99px}
  .price-card{
    background:var(--surface);border:1px solid var(--border);border-radius:18px;
    padding:26px;display:flex;flex-direction:column;gap:18px;position:relative;transition:all .18s;
  }
  .price-card.popular{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent), var(--shadow)}
  .pop-tag{
    position:absolute;top:-11px;left:50%;transform:translateX(-50%);
    background:var(--accent);color:#fff;font-size:10.5px;font-weight:700;
    letter-spacing:.05em;text-transform:uppercase;padding:4px 13px;border-radius:99px;
  }
  .price-num{font-size:38px;font-weight:800;letter-spacing:-.03em}
  .price-num .per{font-size:14px;color:var(--muted);font-weight:500}
  .feat-list{display:flex;flex-direction:column;gap:9px;font-size:13.5px;color:var(--muted)}
  .feat-list .f{display:flex;gap:9px;align-items:flex-start}
  .feat-list .f::before{content:'✓';color:var(--green);font-weight:700;flex-shrink:0}

  /* ---------- Tables / dashboard ---------- */
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px}
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  @media(max-width:840px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px}
  .stat-card .l{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
  .stat-card .n{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-top:5px}
  .stat-card .s{font-size:12px;margin-top:3px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;color:var(--faint);font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;font-weight:650;padding:9px 12px;border-bottom:1px solid var(--border)}
  td{padding:12px;border-bottom:1px solid var(--border)}
  tr:last-child td{border:none}
  .pos{color:var(--green)} .neg{color:var(--red)} .mut{color:var(--muted)}

  /* ---------- Forms ---------- */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:700px){.form-grid{grid-template-columns:1fr}}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:13px;font-weight:600}
  .field .hint{font-size:11.5px;color:var(--faint)}
  .field input,.field select,.field textarea{
    padding:10px 14px;border-radius:10px;border:1px solid var(--border);
    background:var(--bg2);outline:none;transition:border .15s;
  }
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
  .field textarea{resize:vertical;min-height:90px}
  .full{grid-column:1/-1}
  .check-pill{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:10px;border:1px solid var(--border);font-size:13.5px;font-weight:550;cursor:pointer;transition:all .15s;background:var(--surface)}
  .check-pill.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

  /* ---------- Misc ---------- */
  .toast{
    position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);
    background:var(--surface);border:1px solid var(--border2);border-radius:12px;
    padding:12px 20px;font-size:14px;font-weight:550;box-shadow:var(--shadow);
    transition:transform .25s;z-index:300;display:flex;gap:9px;align-items:center;
  }
  .toast.show{transform:translateX(-50%) translateY(0)}
  .progress-track{height:8px;border-radius:99px;background:var(--surface2);overflow:hidden}
  .progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s}
  .crumb{font-size:13px;color:var(--muted);margin-bottom:18px;display:inline-block}
  .crumb:hover{color:var(--text)}
  .empty{padding:60px 20px;text-align:center;color:var(--muted)}
  .banner{
    display:flex;gap:13px;align-items:center;padding:14px 18px;border-radius:13px;
    font-size:13.5px;font-weight:500;margin-bottom:22px;
  }
  .banner-warn{background:var(--yellow-dim);color:var(--yellow);border:1px solid color-mix(in srgb,var(--yellow) 25%,transparent)}
  .banner-info{background:var(--accent-dim);color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 25%,transparent)}
  .banner-danger{background:var(--red-dim);color:var(--red);border:1px solid color-mix(in srgb,var(--red) 25%,transparent)}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:18px;padding:28px;max-width:480px;width:100%;box-shadow:var(--shadow)}
  footer{border-top:1px solid var(--border);padding:34px 28px;text-align:center;color:var(--faint);font-size:13px;margin-top:40px}
</style>
</head>
<body>
<nav>
  <div class="logo" role="button" tabindex="0" aria-label="skillz.ai home" onclick="go('home')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click()}">
    <div class="logo-mark">S</div> skillz<span style="color:var(--accent)">.ai</span>
  </div>
  <div class="nav-links" id="navLinks"></div>
  <div class="nav-right">
    <span class="plan-chip" id="creditChip" style="cursor:pointer" role="button" tabindex="0" aria-label="Marketplace credits — open billing" title="Marketplace credits — refills monthly" onclick="go('billing')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click()}"></span>
    <span class="plan-chip" id="planChip"></span>
    <button class="btn btn-ghost btn-sm" id="authBtn" onclick="authClick()">Demo</button>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme"></button>
    <div class="avatar" role="button" tabindex="0" aria-label="Account — open billing" onclick="go('billing')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click()}">LC</div>
  </div>
</nav>
<main id="app"></main>
<footer>

/* ---- Pricing model v2: normalize seed prices (live rows arrive pre-priced from the DB) ----
   skills ⬡5 · prompts ⬡2 · workflows ⬡30 · datasets ⬡15 (S) / ⬡30 (M) / $ (L+XL, seller-set)
   avatars & voices: ⬡60 personal / $ commercial (seller-set) · models & rag/eval/asset packs: seller-priced $, can be free.
   MCP connectors are removed from the marketplace. Platform keeps 33% of every transaction. */
for(let i = SKILLS.length - 1; i >= 0; i--) if(SKILLS[i].type === 'mcp') SKILLS.splice(i, 1);
SKILLS.forEach(s => {
  const t = s.type || 'skill';
  const flat = {skill: 5, prompt: 2, workflow: 30};
  if(flat[t] != null){ s.credits = flat[t]; s.priceUsd = null; }
  else if(t === 'avatar' || t === 'voice'){ s.priceUsd = (s.buyout || 0) * 50; s.credits = 60; }
  else if(t === 'dataset'){
    s.sizeTier = s.sizeTier || (s.id === 'ds1' ? 'small' : s.id === 'ds2' ? 'medium' : 'large');
    if(s.sizeTier === 'small'){ s.credits = 15; s.priceUsd = null; }
    else if(s.sizeTier === 'medium'){ s.credits = 30; s.priceUsd = null; }
    else { s.priceUsd = (s.credits || 70) * 50; s.credits = null; }
  }
  else { s.priceUsd = (s.credits || 0) * 50 || ({ev1: 3000}[s.id] ?? 0); s.credits = null; } // model / rag / eval / assets
});

const usdStr = c => '$' + (c/100).toLocaleString('en-US', {minimumFractionDigits: c%100 ? 2 : 0, maximumFractionDigits: 2});
function priceBadge(s){
  if(RENTAL_TYPES.includes(s.type)) return `<span class="badge badge-tier">⬡ ${s.credits ?? 60} personal${s.priceUsd ? ` · ${usdStr(s.priceUsd)} commercial` : ''}</span>`;
  if(s.credits != null && s.credits > 0) return `<span class="badge badge-tier">⬡ ${s.credits}</span>`;
  if(s.priceUsd) return `<span class="badge badge-tier">${usdStr(s.priceUsd)}</span>`;
  return `<span class="badge badge-tier">Free</span>`;
}
function llmBadges(llms, max){
  const shown = max ? llms.slice(0,max) : llms;
  let html = shown.map(l=>`<span class="badge badge-llm">${l}</span>`).join('');
  if(max && llms.length > max) html += `<span class="badge badge-llm">+${llms.length-max}</span>`;
  return html;
}
function canDownload(skill){
  return state.subActive && (PLAN_TYPES[state.plan] || []).includes(skill.type || 'skill');
}
function toast(msg){
  const t = $('toast'); t.innerHTML = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), 2600);
}
function designerOf(s){
  if(DESIGNERS[s.designer]) return DESIGNERS[s.designer];
  const label = s.designerLabel || 'Independent Designer';
  const at = label.indexOf('@');
  return at > -1 ? {name: label.slice(0, at).trim(), handle: '@'+label.slice(at+1)} : {name: label, handle: ''};
}
function topUp(pack){ // demo behavior; overridden in live mode
  const n = pack || 60;
  state.credits += n; toast(`⬡ ${n} credits added — $${(n*0.5).toFixed(2)} charged.`); render();
}
function authClick(){ toast('Demo mode — accounts activate when connected to the live backend.'); }
function toggleTheme(){
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = state.theme;
  try{ localStorage.setItem('skillz-theme', state.theme); }catch(e){}
  $('themeBtn').textContent = state.theme === 'dark' ? '☀️' : '🌙';
}
function toggleUpvote(e, id){
  e.stopPropagation();
  if(state.upvoted.has(id)){ state.upvoted.delete(id); SKILLS.find(s=>s.id===id).upvotes--; }
  else { state.upvoted.add(id); SKILLS.find(s=>s.id===id).upvotes++; }
  render();
}
const AUTH_ROUTES = ['billing','dashboard','upload','admin'];
function go(route, arg){
  // In live mode, account pages require a session — prompt sign-in instead (demo mode stays open).
  if(window.LIVE && !window.SESSION && AUTH_ROUTES.includes(route)){ authClick(); return; }
  state.route = route; state.routeArg = arg || null;
  state.detailTab = 'overview';
  if(route === 'dashboard' && typeof loadStudio === 'function') loadStudio();
  if(route === 'skill' && typeof loadReviews === 'function') loadReviews(arg);
  window.scrollTo({top:0});
  render();
}

/* ================= BROWSE ================= */
function filteredSkills(){
  let list = SKILLS.filter(s=>{
    if(state.typeF !== 'All' && s.type !== state.typeF) return false;
    if(state.cat !== 'All' && s.category !== state.cat) return false;
    if(state.tierF !== 'All' && s.tier !== state.tierF) return false;
    if(state.llmF !== 'All' && !s.llms.includes(state.llmF)) return false;
    if(state.search){
      const q = state.search.toLowerCase();
      const designerName = designerOf(s).name || '';
      if(!((s.name+' '+s.desc+' '+s.category+' '+designerName).toLowerCase().includes(q))) return false;
    }
    return true;
  });
  const sorts = {
    trending:(a,b)=>a.trendRank-b.trendRank,
    downloads:(a,b)=>b.downloads-a.downloads,
    upvotes:(a,b)=>b.upvotes-a.upvotes,
    rating:(a,b)=>b.rating-a.rating,
    newest:(a,b)=>b.updated.localeCompare(a.updated),
    security:(a,b)=>b.score-a.score,
  };
  return list.sort(sorts[state.sort]);
}
function renderBrowse(){
  const list = filteredSkills();

  if(state.credits < s.credits){ toast(`Not enough credits — need ⬡${s.credits}, you have ⬡${state.credits}. Upgrade for more.`); return; }
  state.credits -= s.credits; state.downloaded.add(id); s.downloads++;
  toast(`✅ ${s.name} licensed — ⬡${s.credits} credits used. Balance: ⬡${state.credits}.`);

/* ---------- live action overrides ---------- */
async function acquireLive(id, mode){
  if(!requireAuth()) return;
  toast('Processing…');
  const {data, error} = await sb.functions.invoke('acquire', {body:{product_id:id, mode,
    success_url: location.origin + location.pathname + '?purchase=success',
    cancel_url: location.origin + location.pathname}});
  if(error || data?.error){ toast('⚠️ ' + (data?.error || error.message)); return; }
  if(data?.checkout && data.url){ window.location.href = data.url; return; }  // seller-priced ($) → Stripe Checkout
  if(data?.artifact?.url){ // large binary: short-lived signed download URL (fingerprint-registered server-side)
    const a = document.createElement('a'); a.href = data.artifact.url; a.download = data.artifact.filename || ''; a.click();
    await loadAccount(); render();
    toast(`✅ Licensed — key ${data.license_key.slice(0,16)}… · download started (${(data.artifact.format||'file').toUpperCase()}, fingerprint-registered)`);
    return;
  }
  // deliver the watermarked artifact as a real download (any format)
  if(data.artifact){
    let blob;
    if(data.artifact.base64){
      const bin = atob(data.artifact.base64);
      const arr = new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
      blob = new Blob([arr], {type:data.artifact.mime||'application/octet-stream'});
    } else {
      blob = new Blob([data.artifact.content||''], {type:'text/markdown'});
    }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = data.artifact.filename; a.click();
    URL.revokeObjectURL(a.href);
  }
  await loadAccount(); render();
  const meth = data.artifact?.watermark_method ? ` · ${data.artifact.format} watermarked (${data.artifact.watermark_method})` : '';
  toast(`✅ Licensed — key ${data.license_key.slice(0,16)}…${meth}`);
}

/* ---------- live upload + real security scan ---------- */
const TYPE_FROM_LABEL = {'Skill':'skill','Prompt Pack':'prompt','Dataset':'dataset','Avatar':'avatar','Voice':'voice','Fine-tuned Model / LoRA':'model','Workflow':'workflow','RAG Pack':'rag','Eval Suite':'eval','Asset Pack':'assets'};
async function refreshProducts(){
  const {data} = await sb.from('products').select('*');
  if(data?.length){ SKILLS.length=0; data.sort((a,b)=>(a.trend_rank||999)-(b.trend_rank||999)).forEach(r=>SKILLS.push(mapRow(r))); }

const _demoStartScan = startScan, _demoPublish = publishSkill;
startScan = async function(){
  if(!window.LIVE) return _demoStartScan();
  if(!requireAuth()) return;
  const v = id => ($(id)?.value || '').trim();
  const name = v('upName');
  if(!name){ toast('Give your skill a name first.'); return; }
  const type = TYPE_FROM_LABEL[$('upType')?.value] || 'skill';
  const sizeTier = type === 'dataset' ? ($('upSizeTier')?.value || 'small') : null;
  const priceStr = $('upPrice')?.style.display !== 'none' ? ($('upPrice')?.value ?? '') : '';
  const priceCents = priceStr !== '' ? Math.round(parseFloat(priceStr) * 100) : null;
  let filePayload = null;
  const f = $('upFile')?.files?.[0];
  if(f && f.size <= 10 * 1024 * 1024){
    // small file: inline base64 through the submit call
    try{
      const b64 = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(String(r.result).split(',')[1]); r.onerror = rej; r.readAsDataURL(f); });
      filePayload = { name: f.name, base64: b64 };
    }catch(_){ toast('⚠️ Could not read the file.'); return; }
  } else if(f){
    // large file: two-phase — init_upload validates against the per-type cap, then direct-to-storage upload
    state.pendingName = name;
    state.scanState = {pct:5, log:[`Requesting secure upload slot for ${f.name} (${(f.size/1048576).toFixed(1)} MB)…`]};
    render();
    const {data: init, error: initErr} = await sb.functions.invoke('submit-product', {body:{action:'init_upload', type, size_tier: sizeTier, file_name: f.name, file_size: f.size}});
    if(initErr || init?.error){ state.scanState = null; render(); toast('⚠️ ' + (init?.error || initErr.message)); return; }
    state.scanState = {pct:10, log:[`Uploading ${f.name} directly to secure storage…`, 'Large uploads can take a while — keep this tab open.']};
    render();
    const {error: upErr} = await sb.storage.from('bundles').uploadToSignedUrl(init.upload_path, init.token, f);
    if(upErr){ state.scanState = null; render(); toast('⚠️ Upload failed: ' + upErr.message + (f.size > 52428800 ? ' — note: files over 50 MB need the storage plan upgrade (Dashboard → Storage → upload limit).' : '')); return; }
    filePayload = { name: f.name, path: init.upload_path };
  }
  state.pendingName = name;
  state.scanState = {pct:15, log:[filePayload ? `Attached ${f.name} (${(f.size/1048576).toFixed(1)} MB)` : 'Uploading bundle to skillz.ai…','Running automated security scan…']};
  render();
  const {data, error} = await sb.functions.invoke('submit-product', {body:{
    name, version: v('upVer') || '1.0.0', description: v('upDesc'),
    category: $('upCat')?.value || 'Productivity',
    type, size_tier: sizeTier, price_usd_cents: priceCents, file: filePayload,
    llms: [...state.uploadLLMs], docs_markdown: v('upDocs'),
  }});
  if(error || data?.error){ state.scanState=null; render(); toast('⚠️ ' + (data?.error || error.message)); return; }
  const sev = {critical:'✕',high:'✕',medium:'⚠',low:'•'};
  const findingLines = (data.scan.findings||[]).map(f=>`${sev[f.severity]||'•'} [${f.severity.toUpperCase()}] ${f.title} (${f.cwe}) — ${f.detail}`);
  state.scanState = {
    pct:100, done:true, live:true,
    productId: data.product_id, score: data.scan.score, published: data.published, verdict: data.verdict,
    log: [
      `Deep static scan (engine v2.0) complete — verdict: ${(data.verdict||'').toUpperCase()}`,
      ...data.scan.checks.map(c=>`${c.status==='pass'?'✓':c.status==='warn'?'⚠':'✕'} ${c.name} — ${c.note}`),
      ...(findingLines.length?['', '— Detailed findings —', ...findingLines]:[]),
      '', data.message,
    ],
  };
  render();
};
publishSkill = async function(){
  const sc = state.scanState;
  if(!window.LIVE || !sc?.live) return _demoPublish();
  await refreshProducts();
  const id = sc.productId;
  state.scanState = null; state.pendingName = null;
  toast('🎉 Live on the marketplace!');
  go('skill', id);
};

async function loadReviews(id){

async function submitReview(id){
  if(!window.LIVE){ toast('Reviews work on the live site.'); return; }
  if(!requireAuth()) return;
  const rating = parseInt($('revRating')?.value || '5', 10);
  const body = ($('revBody')?.value || '').trim().slice(0, 2000);
  const { error } = await sb.from('product_reviews').upsert({ product_id: id, user_id: window.SESSION.user.id, rating, body }, { onConflict: 'product_id,user_id' });
  if(error){ toast('⚠️ ' + (error.message.includes('policy') ? 'Only licensed buyers can review this product.' : error.message)); return; }
  toast('✅ Review posted.');
  await loadReviews(id); await refreshProducts?.(); render();
}

        <input id="admKey" type="password" placeholder="paste ADMIN_API_KEY" value="${ADMIN_KEY}" oninput="ADMIN_KEY=this.value">
        <span class="hint">Set this as a secret in Supabase, then paste it here to unlock the console.</span></div>
    </div>

      <textarea id="leakText" placeholder="Paste suspected leaked content here…" style="width:100%;min-height:90px;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--bg2)"></textarea>
      <button class="btn btn-primary btn-sm" style="margin-top:10px" onclick="traceLeak()">Decode fingerprint</button>

    </div>

        <div style="font-weight:700">🧾 Moderation queue</div>
        <button class="btn btn-ghost btn-sm" onclick="loadModQueue()">Refresh</button>
      </div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:10px">Products flagged needs-review or blocked by the scanner, plus recent dollar sales (refundable). Approve publishes; unpublish takes down.</div>
      <div id="modQueue" style="font-size:13px;color:var(--muted)">Press Refresh to load…</div>
    </div>
    <div class="panel" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-weight:700">🛡 Takedown queue</div>
        <button class="btn btn-ghost btn-sm" onclick="loadTakedowns()">Refresh</button>
      </div>
      <div id="takedownList" style="font-size:13px;color:var(--muted)">Loading…</div>
    </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap">

        <button class="btn btn-ghost btn-sm" onclick="runOp('process-scan-queue')">Drain scan queue</button>
        <button class="btn btn-ghost btn-sm" onclick="runOp('scan-web')">Run leak crawler</button>
      </div>
      <div id="opResult" style="margin-top:12px;font-size:12.5px;color:var(--muted);font-family:ui-monospace,monospace"></div>
    </div>
  </div>`;
}
async function loadModQueue(){
  const el = $('modQueue'); if(el) el.textContent = 'Loading…';
  const d = await adminCall('admin-moderate', {action:'queue'});
  if(!el) return;
  if(d.error){ el.textContent = '⚠️ ' + d.error; return; }
  const q = (d.queue || []).map(r => `
    <div style="border-top:1px solid var(--border);padding:10px 0">
      <b>${esc(r.product?.name || r.product_id)}</b> <span class="mut">${r.product?.type || ''} · score ${r.score}/100 · ${r.verdict}</span>
      ${r.product ? (r.product.published ? ' <span class="badge badge-safe">live</span>' : ' <span class="badge badge-warn">hidden</span>') : ' <span class="mut">(product gone)</span>'}
      <div class="mut" style="font-size:12px;margin:4px 0">${(r.findings || []).slice(0, 3).map(f => `[${f.severity}] ${f.title}`).join(' · ') || 'no findings'}</div>
      <button class="btn btn-ghost btn-sm" onclick="modAct('approve','${r.product_id}')">✓ Approve & publish</button>
      <button class="btn btn-danger btn-sm" onclick="modAct('unpublish','${r.product_id}')">✕ Unpublish</button>
    </div>`).join('') || '<div style="padding:8px 0">Queue is empty — nothing awaiting review. ✓</div>';
  const sales = (d.recent_sales || []).map(s => `
    <div style="border-top:1px solid var(--border);padding:8px 0;font-size:12.5px">
      ${s.product_id} · $${(s.amount_cents/100).toFixed(2)} · ${(s.created_at || '').slice(0, 10)}
      ${s.refunded_at ? '<span class="badge badge-warn">refunded</span>' : `<button class="btn btn-ghost btn-sm" onclick="modRefund('${s.id}')">↩ Refund</button>`}
    </div>`).join('');
  el.innerHTML = q + (sales ? `<div style="font-weight:700;margin:14px 0 4px;color:var(--text)">Recent dollar sales</div>${sales}` : '');
}
async function modAct(action, id){
  const r = await adminCall('admin-moderate', {action, product_id: id, reason: action === 'unpublish' ? 'admin moderation' : undefined});
  toast(r.ok ? `✅ ${action === 'approve' ? 'Published' : 'Unpublished'}.` : '⚠️ ' + (r.error || 'failed'));
  loadModQueue(); if(typeof refreshProducts === 'function') refreshProducts();
}
async function modRefund(saleId){
  const r = await adminCall('admin-moderate', {action:'refund', sale_id: saleId});
  toast(r.ok ? `✅ Refunded (${r.mode}) — license ${r.license_revoked ? 'revoked' : 'n/a'}.` : '⚠️ ' + (r.error || 'failed'));
  loadModQueue();
}
const FN_BASE = SUPA_URL + '/functions/v1/';
async function adminCall(fn, body){
  if(!ADMIN_KEY){ toast('Enter your ADMIN_API_KEY first.'); return {error:'no key'}; }
  try{
    const r = await fetch(FN_BASE+fn, {method:'POST', headers:{'Content-Type':'application/json','x-admin-key':ADMIN_KEY}, body:JSON.stringify(body||{})});
    return await r.json();
  }catch(e){ return {error:String(e)}; }
}
async function traceLeak(){
  const text = $('leakText').value;
  const res = $('leakResult');
  res.innerHTML = 'Decoding…';
  const data = await adminCall('decode-fingerprint', {text});
  if(data.error){ res.innerHTML = `<span style="color:var(--red)">${data.error==='Unauthorized'?'Set ADMIN_API_KEY as a Supabase secret and paste it above to enable.':data.error}</span>`; return; }
  if(!data.found){ res.innerHTML = `<span class="mut">No skillz.ai fingerprint detected in that content.</span>`; return; }
  res.innerHTML = `<div class="banner banner-danger" style="margin:0;display:block">
    <b>⚠ Leak traced — ${data.detected_format}</b><br>
    ${data.matches.map(m=>m.account?`Account: <b>${m.account.display_name}</b> (${m.account.handle}) · IP ${m.ip_address||'—'} · issued ${(m.issued_at||'').slice(0,10)} · license ${m.license?.license_key?.slice(0,18)||'—'}… · product ${m.product_id}`:`Marker ${m.marker} (unregistered)`).join('<br>')}
  </div>`;
}
async function loadTakedowns(){
  const el = $('takedownList'); el.textContent = 'Loading…';
  // takedowns are service-role only; read via admin function-less path not available, so use a tiny RPC-less query through decode is N/A.
  el.innerHTML = '<span class="mut">Takedown rows are service-role protected. The daily crawler writes here; view them in your Supabase dashboard or wire a read endpoint. Trace + crawler actions below are live.</span>';
}
async function runOp(fn){
  const el = $('opResult'); el.textContent = 'Running '+fn+'…';
  const data = await adminCall(fn, {});
  el.textContent = data.error ? (data.error==='Unauthorized'?'Set ADMIN_API_KEY to enable.':data.error) : JSON.stringify(data, null, 1).slice(0,600);
}

initLive();
